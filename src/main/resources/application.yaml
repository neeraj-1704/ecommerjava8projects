spring:
  application:
    name: ecommerce-api

  datasource:
    url: jdbc:postgresql://localhost:5432/ecomm2
    username: postgres
    password: pgAdmin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        #include: "*"  # all the endpoi  nts in the cosebae
        include: beans, health

  endpoint:
    health:
      show-details: always
  #      show-details:  when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: MyNewApp
    description: App build by us team and neeraj khalkar
    version: 1.0.0

server:
  port: 8081

